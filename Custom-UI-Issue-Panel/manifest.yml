modules:
  jira:issuePanel:
    - key: custom-ui-issue-panel-hello-world-panel
      resource: main
      resolver:
        function: resolver
      viewportSize: medium
      title: Custom-UI-Issue-Panel
      icon: https://developer.atlassian.com/platform/forge/images/issue-panel-icon.svg
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: static/hello-world/build
    tunnel:
      port: 5173
permissions:
  scopes:
    - read:jira-work
  content:
    styles:
      - 'unsafe-inline'
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/798ac0a7-b2a2-4f74-9586-c73e7b726f0b
